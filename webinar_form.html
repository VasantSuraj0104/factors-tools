<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factors.ai — Webinar to Post</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #7c3aed;
    --accent-dim: rgba(124, 58, 237, 0.12);
    --text: #f0f0f0;
    --text-muted: #666666;
    --success: #00c896;
    --error: #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .container { width: 100%; max-width: 640px; }

  .header { margin-bottom: 2.5rem; }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  h1 { font-size: 1.75rem; font-weight: 600; line-height: 1.2; margin-bottom: 0.5rem; }

  .subtitle { color: var(--text-muted); font-size: 0.9rem; font-weight: 300; }

  .form-group { margin-bottom: 1.5rem; }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    font-family: 'DM Mono', monospace;
  }

  input, textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 0.875rem 1rem;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus { border-color: var(--accent); }

  input::placeholder, textarea::placeholder { color: var(--text-muted); font-style: italic; }

  textarea { resize: vertical; line-height: 1.6; }

  .submit-btn {
    width: 100%;
    padding: 1rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .submit-btn:hover { background: #6d28d9; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .status {
    margin-top: 1.25rem;
    padding: 0.875rem 1rem;
    border-radius: 6px;
    font-size: 0.875rem;
    font-weight: 500;
    display: none;
    align-items: center;
    gap: 0.5rem;
  }

  .status.success { background: rgba(0,200,150,0.1); border: 1px solid rgba(0,200,150,0.3); color: var(--success); display: flex; }
  .status.error { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); color: var(--error); display: flex; }
  .status.loading { background: var(--accent-dim); border: 1px solid rgba(124,58,237,0.3); color: var(--accent); display: flex; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(124,58,237,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .divider { height: 1px; background: var(--border); margin: 2rem 0; }
  .footer { font-size: 0.8rem; color: var(--text-muted); text-align: center; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">Factors.ai — Internal Tool</div>
    <h1>Webinar → Post Captions</h1>
    <p class="subtitle">Submit webinar details and Claude will write 3 LinkedIn caption options automatically.</p>
  </div>

  <form id="webinarForm">
    <div class="form-group">
      <label>Webinar Title</label>
      <input type="text" id="title" placeholder="e.g. How to Build a Predictable B2B Pipeline" required />
    </div>

    <div class="form-group">
      <label>Mansi's Summary</label>
      <textarea id="summary" rows="5" placeholder="Paste Mansi's webinar summary doc here..." required></textarea>
    </div>

    <div class="form-group">
      <label>StreamYard Transcript / AI Clip Description</label>
      <textarea id="transcript" rows="5" placeholder="Paste the StreamYard AI clip description or key transcript excerpts here..." required></textarea>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">Generate Captions</button>
    <div class="status" id="status"></div>
  </form>

  <div class="divider"></div>
  <div class="footer">Captions will appear in Notion → Organic Social Board</div>
</div>

<script>
  const WEBHOOK_URL = 'https://n8n-api.factors.app/webhook/webinar-to-notion';

  function showStatus(type, message) {
    const status = document.getElementById('status');
    status.className = 'status ' + type;
    if (type === 'loading') {
      status.innerHTML = '<div class="spinner"></div><span>' + message + '</span>';
    } else {
      status.innerHTML = '<span>' + (type === 'success' ? '✓' : '✕') + '</span><span>' + message + '</span>';
    }
  }

  document.getElementById('webinarForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const title = document.getElementById('title').value;
    const summary = document.getElementById('summary').value;
    const transcript = document.getElementById('transcript').value;
    const btn = document.getElementById('submitBtn');

    btn.disabled = true;
    btn.textContent = 'Generating...';
    showStatus('loading', 'Sending to Claude — writing caption options...');

    try {
      await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ title, summary, transcript }),
        mode: 'no-cors'
      });

      showStatus('success', 'Done! Captions are now in Notion → Organic Social Board.');
      document.getElementById('title').value = '';
      document.getElementById('summary').value = '';
      document.getElementById('transcript').value = '';

    } catch (err) {
      showStatus('error', 'Something went wrong. Check n8n or try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Generate Captions';
    }
  });
</script>
</body>
</html>
